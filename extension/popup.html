<!DOCTYPE html>
<html>

<head>
    <title>JDScope</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Segoe UI", sans-serif;
        }

        body {
            width: 300px;
            padding: 12px;
            background: #EEF4FF;
        }

       .container{
    padding:18px;
}

        h2 {
            color: #2563EB;
            margin-bottom: 8px;
            font-size: 24px;
        }

        p {
            color: #6B7280;
            font-size: 14px;
            margin-bottom: 20px;
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 12px;
            background: #2563EB;
            color: white;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s ease;
        }

        button:hover {
            background: #1D4ED8;
            transform: translateY(-2px);
        }

        button:active {
            transform: scale(0.98);
        }

        #status {
            margin-top: 18px;
            color: #374151;
            font-size: 13px;
            min-height: 18px;
        }
    </style>
</head>

<body>

    <div class="container">

        <h2>JDScope</h2>

        <p>AI Powered Job Description Analyzer</p>

        <button id="analyze-button">
            Analyze Job
        </button>

        <div id="status"></div>

    </div>

    <script src="popup.js"></script>

</body>

</html>
